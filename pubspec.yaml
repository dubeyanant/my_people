name: my_people
publish_to: none
version: 4.2.1+8
description: An app for noting details about people.

dev_dependencies:
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.2
  dio: ^5.4.3+1
  firebase_analytics: ^12.1.2
  firebase_core: ^4.4.0
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.6+2
  flutter_svg: ^2.0.10+1
  google_generative_ai: ^0.4.3
  icons_launcher: ^3.0.1
  image_picker: ^1.0.8
  install_plugin: ^2.1.0
  package_info_plus: ^9.0.0
  path_provider: ^2.0.2
  shared_preferences: ^2.2.3
  sqflite: ^2.0.0
  uuid: ^4.4.0
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  local_auth: ^3.0.1
  file_picker: ^10.3.10

flutter:
  assets:
    - assets/
    - assets/arrows/
    - assets/profile_pictures/
    - .env
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/ic_logo.png"
  adaptive_icon_background: "#FFE9DD"
  adaptive_icon_foreground: "assets/ic_logo.png"
